services:
  postgres:
    image: postgres:18-alpine
    container_name: cocktail-recipe-postgres
    ports:
      - '5432:5432'
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=cocktail_recipe
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - cocktail-recipe-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  #  Local postgres backup
  #  Further information: https://github.com/prodrigestivill/docker-postgres-backup-local
  #  pgbackups:
  #    image: prodrigestivill/postgres-backup-local
  #    restart: always
  #    volumes:
  #      - /your/local/path:/backups
  #    depends_on:
  #      postgres:
  #        condition: service_healthy
  #    environment:
  #      - POSTGRES_HOST=postgres
  #      - POSTGRES_DB=cocktail_recipe
  #      - POSTGRES_USER=postgres
  #      - POSTGRES_PASSWORD=postgres
  #      - POSTGRES_PORT=5432
  #      - POSTGRES_EXTRA_OPTS=-Z1 --schema=public --blobs
  #      - SCHEDULE=@daily
  #      - BACKUP_KEEP_DAYS=7
  #      - BACKUP_KEEP_WEEKS=4
  #      - BACKUP_KEEP_MONTHS=6
  #      - HEALTHCHECK_PORT=8080
  #    networks:
  #      - cocktail-recipe-network

  cocktail-manager:
    depends_on:
      postgres:
        condition: service_healthy
      chromium-service:
        condition: service_started
    image: ghcr.io/jo-gross/cocktail-manager:latest
    container_name: cocktail-manager
    build:
      context: .
      dockerfile: Dockerfile
    #      args:
    #        DEPLOYMENT: 'staging' # or "production" or "development"
    #        DEMO_MODE: 'true' # Enable demo mode
    ports:
      - '3000:3000'
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/cocktail_recipe
      - CHROMIUM_HOST=chromium-service
      - DISABLE_WORKSPACE_CREATION=false
      - WORKSPACE_CREATION_DISABLED_MESSAGE=Du benötigst eine Workspace?<br/>Schreibe einfach eine <a href="mailto:info@cocktail-manager.de">Mail ans Team</a>!
      # Demo Mode Configuration (uncomment to enable)
      # - DEMO_MODE=true
      # - DEMO_WORKSPACE_CONFIG_PATH=/app/config/demo-workspace-config.json
      # - DEMO_TTL_HOURS=24
      # Email (e.g. for join requests; with fake-smtp: SMTP_HOST=fake-smtp, SMTP_PORT=8025; EMAIL_TEMPLATE_CONFIG JSON with appUrl, supportEmail)
      # - SMTP_HOST=fake-smtp
      # - SMTP_PORT=8025
      # - MAIL_FROM=noreply@localhost
      # - EMAIL_TEMPLATE_CONFIG={"appUrl":"http://localhost:3000","supportEmail":"support@cocktail-manager.de"}
    networks:
      - cocktail-recipe-network
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3000/api/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  chromium-service:
    image: eu.gcr.io/zenika-hub/alpine-chrome:latest
    container_name: chromium-service
    networks:
      - cocktail-recipe-network
    command:
      - chromium-browser
      - --headless
      - --disable-gpu
      - --no-sandbox
      - --disable-dev-shm-usage
      - --remote-debugging-address=0.0.0.0
      - --remote-debugging-port=9222
    ports:
      - '9222:9222'
    restart: unless-stopped

  # Fake SMTP server for local testing of email notifications (e.g. join requests)
  # Web UI: http://localhost:8080 – SMTP port: 8025
  # See docs/EMAIL.md for configuration
  fake-smtp:
    image: gessnerfl/fake-smtp-server:latest
    container_name: cocktail-recipe-fake-smtp
    ports:
      - '8025:8025'
      - '8080:8080'
    networks:
      - cocktail-recipe-network

networks:
  cocktail-recipe-network:

volumes:
  postgres_data:
