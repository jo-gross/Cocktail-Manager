name: Release

on:
  release:
    types:
      - published

env:
  REGISTRY: ghcr.io

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.JG_SEMANTIC_RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.JG_SEMANTIC_RELEASE_BOT_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0
          ref: ${{ github.event.release.target_commitish }}

      - name: Set image name
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          MAJOR_MINOR="${VERSION%.*}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "major_minor=$MAJOR_MINOR" >> "$GITHUB_OUTPUT"
          echo "Releasing version: $VERSION (major.minor: $MAJOR_MINOR)"

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bump version in package.json
        run: npm version "${{ steps.version.outputs.version }}" --no-git-tag-version

      - name: Update technical changelog
        run: |
          RELEASE_DATE=$(date +%Y-%m-%d)
          RELEASE_BODY="${{ github.event.release.body }}"
          VERSION="${{ steps.version.outputs.version }}"

          ENTRY="## [${VERSION}](https://github.com/${{ github.repository }}/releases/tag/v${VERSION}) (${RELEASE_DATE})"
          ENTRY="${ENTRY}"$'\n\n'"${RELEASE_BODY}"$'\n\n'

          if [ -f docs/CHANGELOG.md ]; then
            echo -e "${ENTRY}$(cat docs/CHANGELOG.md)" > docs/CHANGELOG.md
          else
            echo -e "${ENTRY}" > docs/CHANGELOG.md
          fi

      - name: Commit release metadata
        env:
          TARGET_BRANCH: ${{ github.event.repository.default_branch }}
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git config user.name "JG-Semantic-Release-Bot[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json docs/CHANGELOG.md
          git diff --staged --quiet || git commit -m "chore(release): v${{ steps.version.outputs.version }} [skip ci]"
          git push origin HEAD:"$TARGET_BRANCH"

      - name: Move release tag to release commit
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          git tag -f "$RELEASE_TAG"
          git push --force origin "refs/tags/$RELEASE_TAG"

      - name: Build application
        run: pnpm build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.major_minor }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
