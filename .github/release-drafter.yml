name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'

template: |
  ## What's Changed

  $CHANGES

  **Full Changelog**: https://github.com/$OWNER/$REPOSITORY/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION

categories:
  - title: 'New Features'
    labels:
      - 'feature'
      - 'enhancement'
  - title: 'Bug Fixes'
    labels:
      - 'fix'
      - 'bugfix'
      - 'bug'
  - title: 'Documentation'
    labels:
      - 'documentation'
      - 'docs'
  - title: 'Dependencies'
    labels:
      - 'dependencies'
  - title: 'Other Changes'
    labels:
      - 'chore'
      - 'refactor'
      - 'style'
      - 'ci'

change-template: '- $TITLE (#$NUMBER) @$AUTHOR'
change-title-escapes: '\<*_&'
no-changes-template: 'No changes since last release.'

version-resolver:
  major:
    labels:
      - 'major'
      - 'breaking'
  minor:
    labels:
      - 'feature'
      - 'enhancement'
  patch:
    labels:
      - 'fix'
      - 'bugfix'
      - 'bug'
      - 'documentation'
      - 'dependencies'
      - 'chore'
      - 'refactor'
  default: patch

autolabeler:
  - label: 'feature'
    title:
      - '/^feat(\(.*\))?[!]?:/i'
  - label: 'fix'
    title:
      - '/^fix(\(.*\))?[!]?:/i'
  - label: 'documentation'
    title:
      - '/^docs(\(.*\))?[!]?:/i'
  - label: 'chore'
    title:
      - '/^chore(\(.*\))?[!]?:/i'
  - label: 'refactor'
    title:
      - '/^refactor(\(.*\))?[!]?:/i'
  - label: 'style'
    title:
      - '/^style(\(.*\))?[!]?:/i'
  - label: 'ci'
    title:
      - '/^ci(\(.*\))?[!]?:/i'
  - label: 'dependencies'
    title:
      - '/^build\(deps\)/i'
  - label: 'breaking'
    title:
      - '/^.*!:/i'

exclude-labels:
  - 'skip-changelog'
